name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  quality:
    name: Quality
    strategy:
      fail-fast: true
      matrix:
        php-version: [ '8.3', '8.4' ]

    uses: ./.github/workflows/_quality.yml
    with:
      php-version: ${{ matrix.php-version }}
      run-cs: ${{ matrix.php-version == '8.3' }}
      strict-validate: true

  github-release:
    name: Create GitHub Release
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true

  packagist:
    name: Update Packagist
    needs: github-release
    runs-on: ubuntu-latest
    env:
      PACKAGIST_USERNAME: ${{ secrets.PACKAGIST_USERNAME }}
      PACKAGIST_API_TOKEN: ${{ secrets.PACKAGIST_API_TOKEN }}

    steps:
      - name: Notify Packagist
        if: env.PACKAGIST_USERNAME != '' && env.PACKAGIST_API_TOKEN != ''
        run: |
          curl -fsS -X POST \
            -H 'content-type: application/json' \
            "https://packagist.org/api/update-package?username=${PACKAGIST_USERNAME}&apiToken=${PACKAGIST_API_TOKEN}" \
            -d '{"repository":{"url":"https://github.com/${{ github.repository }}"}}'
