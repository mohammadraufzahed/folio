name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    strategy:
      fail-fast: false
      matrix:
        php-version: [ '8.3', '8.4' ]

    uses: ./.github/workflows/_quality.yml
    with:
      php-version: ${{ matrix.php-version }}
      run-cs: ${{ matrix.php-version == '8.3' }}
      strict-validate: true
